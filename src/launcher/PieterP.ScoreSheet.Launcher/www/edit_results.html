<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreSheet Edit Points</title>
    <style>
        :root {
            --background: #f4f7fb;
            --panel: #ffffff;
            --panel-soft: #edf2f7;
            --text: #172033;
            --muted: #65758b;
            --border: #d7dee9;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --success: #0f766e;
            --danger: #b91c1c;
            --shadow: 0 14px 34px rgba(23, 32, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: var(--background);
            color: var(--text);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            padding: 16px;
        }

        .app {
            display: grid;
            gap: 14px;
            width: min(100%, 760px);
            margin: 0 auto;
        }

        .panel {
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
            padding: 18px;
            background: #111827;
            color: #f8fafc;
        }

        h1,
        h2 {
            margin: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.1;
        }

        h2 {
            font-size: 20px;
        }

        .label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        header .label {
            color: #cbd5e1;
        }

        .language-bar {
            display: flex;
            gap: 6px;
        }

        .language-button {
            display: grid;
            width: 48px;
            min-height: 38px;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            line-height: 1;
        }

        .language-button.active {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.2);
        }

        .flag-icon {
            display: block;
            width: 30px;
            height: 22px;
            border-radius: 3px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.16);
        }

        .content {
            display: grid;
            gap: 14px;
            padding: 14px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        select,
        input,
        button {
            width: 100%;
            border-radius: 8px;
            font: inherit;
        }

        select,
        input {
            min-height: 48px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            padding: 10px 12px;
        }

        select:disabled,
        input:disabled,
        button:disabled {
            opacity: 0.55;
        }

        button {
            min-height: 48px;
            border: 0;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 900;
        }

        button:active:not(:disabled) {
            background: var(--accent-dark);
            transform: translateY(1px);
        }

        .secondary {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
        }

        .top-actions {
            display: grid;
        }

        .sets {
            display: grid;
            gap: 10px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr) 22px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel-soft);
        }

        .set-number {
            font-weight: 900;
            text-align: center;
        }

        .dash {
            color: var(--muted);
            font-weight: 900;
            text-align: center;
        }

        .status {
            min-height: 44px;
            border-radius: 8px;
            padding: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .status.success {
            background: rgba(15, 118, 110, 0.1);
            color: var(--success);
        }

        .status.error {
            background: rgba(185, 28, 28, 0.1);
            color: var(--danger);
        }

        @media (min-width: 620px) {
            body {
                padding: 24px;
            }

            .content {
                padding: 18px;
            }

            .top-actions {
                grid-template-columns: minmax(0, 1fr) 180px;
                align-items: end;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="panel">
            <header>
                <div>
                    <span class="label">ScoreSheet</span>
                    <h1 data-i18n="title">Edit points</h1>
                </div>
                <div class="language-bar" aria-label="Language">
                    <button class="language-button" type="button" data-lang="en-US" title="American English" aria-label="American English">
                        <svg class="flag-icon" viewBox="0 0 60 42" role="img" aria-hidden="true">
                            <rect width="60" height="42" fill="#fff"/>
                            <rect width="60" height="3.23" y="0" fill="#b22234"/>
                            <rect width="60" height="3.23" y="6.46" fill="#b22234"/>
                            <rect width="60" height="3.23" y="12.92" fill="#b22234"/>
                            <rect width="60" height="3.23" y="19.38" fill="#b22234"/>
                            <rect width="60" height="3.23" y="25.85" fill="#b22234"/>
                            <rect width="60" height="3.23" y="32.31" fill="#b22234"/>
                            <rect width="60" height="3.23" y="38.77" fill="#b22234"/>
                            <rect width="25" height="22.6" fill="#3c3b6e"/>
                            <g fill="#fff">
                                <circle cx="4" cy="4" r="1"/><circle cx="10" cy="4" r="1"/><circle cx="16" cy="4" r="1"/><circle cx="22" cy="4" r="1"/>
                                <circle cx="7" cy="8" r="1"/><circle cx="13" cy="8" r="1"/><circle cx="19" cy="8" r="1"/>
                                <circle cx="4" cy="12" r="1"/><circle cx="10" cy="12" r="1"/><circle cx="16" cy="12" r="1"/><circle cx="22" cy="12" r="1"/>
                                <circle cx="7" cy="16" r="1"/><circle cx="13" cy="16" r="1"/><circle cx="19" cy="16" r="1"/>
                                <circle cx="4" cy="20" r="1"/><circle cx="10" cy="20" r="1"/><circle cx="16" cy="20" r="1"/><circle cx="22" cy="20" r="1"/>
                            </g>
                        </svg>
                    </button>
                    <button class="language-button" type="button" data-lang="nl" title="Nederlands" aria-label="Nederlands">
                        <svg class="flag-icon" viewBox="0 0 60 42" role="img" aria-hidden="true">
                            <rect width="60" height="14" y="0" fill="#ae1c28"/>
                            <rect width="60" height="14" y="14" fill="#fff"/>
                            <rect width="60" height="14" y="28" fill="#21468b"/>
                        </svg>
                    </button>
                    <button class="language-button" type="button" data-lang="fr" title="Fran&ccedil;ais" aria-label="Francais">
                        <svg class="flag-icon" viewBox="0 0 60 42" role="img" aria-hidden="true">
                            <rect width="20" height="42" x="0" fill="#0055a4"/>
                            <rect width="20" height="42" x="20" fill="#fff"/>
                            <rect width="20" height="42" x="40" fill="#ef4135"/>
                        </svg>
                    </button>
                </div>
            </header>
            <div class="content">
                <div class="top-actions">
                    <div class="field">
                        <label class="label" for="match-select" data-i18n="matchLabel">Team match</label>
                        <select id="match-select"></select>
                    </div>
                    <button id="refresh-button" class="secondary" type="button" data-i18n="refresh">Refresh</button>
                </div>

                <div class="field">
                    <label class="label" for="game-select" data-i18n="gameLabel">Match</label>
                    <select id="game-select"></select>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="content">
                <h2 data-i18n="setsTitle">Set scores</h2>
                <div id="sets" class="sets"></div>
                <div id="status" class="status" data-i18n="loading">Loading...</div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var translations = {
                "en-US": {
                    title: "Edit points",
                    matchLabel: "Team match",
                    gameLabel: "Individual match",
                    setsTitle: "Set scores",
                    refresh: "Refresh",
                    loading: "Loading...",
                    loadingMatches: "Loading matches...",
                    loadingPoints: "Loading points...",
                    ready: "Ready. Changes are saved while typing.",
                    saving: "Saving...",
                    saved: "Saved.",
                    saveFailed: "Saving failed.",
                    pointsFailed: "Could not load points. Showing current match data.",
                    matchesFailed: "Could not load /api/matches.json.",
                    noMatches: "No open matches",
                    noGames: "No individual matches found",
                    home: "Home",
                    away: "Away",
                    player: "Player",
                    double: "Double",
                    set: "Set"
                },
                nl: {
                    title: "Punten aanpassen",
                    matchLabel: "Wedstrijd",
                    gameLabel: "Match",
                    setsTitle: "Setstanden",
                    refresh: "Verversen",
                    loading: "Laden...",
                    loadingMatches: "Wedstrijden laden...",
                    loadingPoints: "Punten laden...",
                    ready: "Klaar. Wijzigingen worden opgeslagen tijdens het typen.",
                    saving: "Opslaan...",
                    saved: "Opgeslagen.",
                    saveFailed: "Opslaan mislukt.",
                    pointsFailed: "Kon punten niet ophalen. Huidige wedstrijddata wordt getoond.",
                    matchesFailed: "Kon /api/matches.json niet ophalen.",
                    noMatches: "Geen open wedstrijden",
                    noGames: "Geen matchen gevonden",
                    home: "Thuis",
                    away: "Uit",
                    player: "Speler",
                    double: "Dubbel",
                    set: "Set"
                },
                fr: {
                    title: "Modifier les points",
                    matchLabel: "Rencontre",
                    gameLabel: "Match",
                    setsTitle: "Scores des sets",
                    refresh: "Actualiser",
                    loading: "Chargement...",
                    loadingMatches: "Chargement des rencontres...",
                    loadingPoints: "Chargement des points...",
                    ready: "Pr\u00eat. Les modifications sont enregistr\u00e9es pendant la saisie.",
                    saving: "Enregistrement...",
                    saved: "Enregistr\u00e9.",
                    saveFailed: "\u00c9chec de l'enregistrement.",
                    pointsFailed: "Impossible de charger les points. Les donn\u00e9es actuelles sont affich\u00e9es.",
                    matchesFailed: "Impossible de charger /api/matches.json.",
                    noMatches: "Aucune rencontre ouverte",
                    noGames: "Aucun match trouv\u00e9",
                    home: "Domicile",
                    away: "Ext\u00e9rieur",
                    player: "Joueur",
                    double: "Double",
                    set: "Set"
                }
            };

            var lang = localStorage.getItem("scoresheet-edit-lang") || "en-US";
            if (lang === "en") {
                lang = "en-US";
            }
            var matches = [];
            var activeMatch = null;
            var activeGame = null;
            var isLoading = false;
            var saveRequestId = 0;
            var latestRenderedPoints = [];
            var matchSelect = document.getElementById("match-select");
            var gameSelect = document.getElementById("game-select");
            var sets = document.getElementById("sets");
            var statusBox = document.getElementById("status");
            var refreshButton = document.getElementById("refresh-button");
            var languageButtons = document.querySelectorAll(".language-button");

            function t(key) {
                return (translations[lang] && translations[lang][key]) || translations["en-US"][key] || key;
            }

            function text(value, fallback) {
                if (value === null || value === undefined || value === "") {
                    return fallback || "";
                }
                return String(value);
            }

            function number(value) {
                var parsed = parseInt(value, 10);
                return isNaN(parsed) ? 0 : parsed;
            }

            function clear(element) {
                while (element.firstChild) {
                    element.removeChild(element.firstChild);
                }
            }

            function setStatus(message, kind) {
                statusBox.textContent = message;
                statusBox.className = "status" + (kind ? " " + kind : "");
            }

            function setBusy(isBusy) {
                isLoading = isBusy;
                matchSelect.disabled = isBusy;
                gameSelect.disabled = isBusy || !activeMatch;
                refreshButton.disabled = isBusy;
            }

            function createOption(value, label) {
                var option = document.createElement("option");
                option.value = value;
                option.textContent = label;
                return option;
            }

            function playerName(players, playerNumber) {
                var index = number(playerNumber) - 1;
                if (index < 0 || !players || !players[index]) {
                    return number(playerNumber) === 0 ? t("double") : "-";
                }
                return text(players[index].Name, t("player") + " " + playerNumber);
            }

            function gameLabel(match, game) {
                var homeNames = (game.HomePlayers || []).map(function (p) { return playerName(match.HomePlayers, p); }).join(" / ");
                var awayNames = (game.AwayPlayers || []).map(function (p) { return playerName(match.AwayPlayers, p); }).join(" / ");
                return "#" + text(game.MatchIndex, "") + " - " + (homeNames || "-") + " vs. " + (awayNames || "-");
            }

            function selectedMatchNr() {
                return matchSelect.value;
            }

            function selectedMatchIndex() {
                return number(gameSelect.value);
            }

            function findMatch(matchNr) {
                var i;
                for (i = 0; i < matches.length; i += 1) {
                    if (matches[i].MatchNr === matchNr) {
                        return matches[i];
                    }
                }
                return null;
            }

            function findGame(match, matchIndex) {
                var games = match && Array.isArray(match.Matches) ? match.Matches : [];
                var i;
                for (i = 0; i < games.length; i += 1) {
                    if (number(games[i].MatchIndex) === matchIndex) {
                        return games[i];
                    }
                }
                return null;
            }

            function renderStaticText() {
                var nodes = document.querySelectorAll("[data-i18n]");
                var i;
                document.documentElement.lang = lang;
                document.title = t("title") + " - ScoreSheet";
                for (i = 0; i < nodes.length; i += 1) {
                    nodes[i].textContent = t(nodes[i].getAttribute("data-i18n"));
                }
                for (i = 0; i < languageButtons.length; i += 1) {
                    languageButtons[i].classList.toggle("active", languageButtons[i].getAttribute("data-lang") === lang);
                }
            }

            function renderMatchOptions(previousMatchNr) {
                var i;
                clear(matchSelect);
                if (!matches.length) {
                    matchSelect.appendChild(createOption("", t("noMatches")));
                    activeMatch = null;
                    return;
                }
                for (i = 0; i < matches.length; i += 1) {
                    var match = matches[i];
                    var label = text(match.HomeTeam, t("home")) + " - " + text(match.AwayTeam, t("away")) + " (" + text(match.MatchNr, "") + ")";
                    matchSelect.appendChild(createOption(match.MatchNr, label));
                }
                if (previousMatchNr && findMatch(previousMatchNr)) {
                    matchSelect.value = previousMatchNr;
                }
                activeMatch = findMatch(selectedMatchNr()) || matches[0];
                matchSelect.value = activeMatch.MatchNr;
            }

            function renderGameOptions(previousMatchIndex) {
                var games = activeMatch && Array.isArray(activeMatch.Matches) ? activeMatch.Matches.slice(0) : [];
                clear(gameSelect);
                games.sort(function (left, right) {
                    return number(left.MatchIndex) - number(right.MatchIndex);
                });
                if (!games.length) {
                    gameSelect.appendChild(createOption("", t("noGames")));
                    activeGame = null;
                    return;
                }
                games.forEach(function (game) {
                    gameSelect.appendChild(createOption(game.MatchIndex, gameLabel(activeMatch, game)));
                });
                if (previousMatchIndex && findGame(activeMatch, previousMatchIndex)) {
                    gameSelect.value = previousMatchIndex;
                }
                activeGame = findGame(activeMatch, selectedMatchIndex()) || games[0];
                gameSelect.value = activeGame.MatchIndex;
            }

            function scoreInputId(setIndex, side) {
                return "set-" + setIndex + "-" + side;
            }

            function renderSetInputs(points) {
                var values = points || [];
                var setCount = Math.ceil(values.length / 2);
                var i;
                latestRenderedPoints = values.slice(0);
                clear(sets);
                for (i = 0; i < setCount; i += 1) {
                    var row = document.createElement("div");
                    var homeInput = document.createElement("input");
                    var awayInput = document.createElement("input");

                    row.className = "set-row";
                    homeInput.id = scoreInputId(i, "home");
                    homeInput.inputMode = "text";
                    homeInput.autocomplete = "off";
                    homeInput.value = text(values[i * 2], "");
                    homeInput.addEventListener("input", savePoints);
                    awayInput.id = scoreInputId(i, "away");
                    awayInput.inputMode = "text";
                    awayInput.autocomplete = "off";
                    awayInput.value = text(values[i * 2 + 1], "");
                    awayInput.addEventListener("input", savePoints);

                    row.appendChild(document.createElement("div")).className = "set-number";
                    row.firstChild.textContent = t("set") + " " + (i + 1);
                    row.appendChild(homeInput);
                    row.appendChild(document.createElement("div")).className = "dash";
                    row.childNodes[2].textContent = "-";
                    row.appendChild(awayInput);
                    sets.appendChild(row);
                }
            }

            function collectPoints() {
                var values = [];
                var rows = sets.querySelectorAll(".set-row");
                var i;
                for (i = 0; i < rows.length; i += 1) {
                    values.push(document.getElementById(scoreInputId(i, "home")).value.trim());
                    values.push(document.getElementById(scoreInputId(i, "away")).value.trim());
                }
                return values;
            }

            function pointsUrl() {
                return "/api/points.json?MatchNr=" + encodeURIComponent(activeMatch.MatchNr) + "&MatchIndex=" + encodeURIComponent(activeGame.MatchIndex);
            }

            function fetchPoints() {
                if (!activeMatch || !activeGame) {
                    renderSetInputs([]);
                    setBusy(false);
                    return;
                }
                setBusy(true);
                setStatus(t("loadingPoints"));
                fetch(pointsUrl(), { method: "GET", cache: "no-store" })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function (points) {
                        renderSetInputs(Array.isArray(points) ? points : []);
                        setStatus(t("ready"));
                    })
                    .catch(function () {
                        renderSetInputs(activeGame.Points || latestRenderedPoints);
                        setStatus(t("pointsFailed"), "error");
                    })
                    .then(function () {
                        setBusy(false);
                    });
            }

            function renderSelections(previousMatchNr, previousMatchIndex) {
                renderMatchOptions(previousMatchNr);
                renderGameOptions(previousMatchIndex);
                fetchPoints();
            }

            function fetchMatches() {
                var previousMatchNr = selectedMatchNr();
                var previousMatchIndex = selectedMatchIndex();
                setBusy(true);
                setStatus(t("loadingMatches"));
                fetch("/api/matches.json", { method: "GET", cache: "no-store" })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function (data) {
                        matches = Array.isArray(data) ? data : [];
                        renderSelections(previousMatchNr, previousMatchIndex);
                    })
                    .catch(function () {
                        matches = [];
                        renderSelections("", 0);
                        setStatus(t("matchesFailed"), "error");
                    })
                    .then(function () {
                        setBusy(false);
                    });
            }

            function savePoints() {
                var requestId;
                if (!activeMatch || !activeGame || isLoading) {
                    return;
                }
                requestId = ++saveRequestId;
                latestRenderedPoints = collectPoints();
                setStatus(t("saving"));
                fetch(pointsUrl(), {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(latestRenderedPoints)
                })
                    .then(function (response) {
                        if (response.status !== 204) {
                            throw new Error("HTTP " + response.status);
                        }
                        if (requestId === saveRequestId) {
                            setStatus(t("saved"), "success");
                        }
                    })
                    .catch(function () {
                        if (requestId === saveRequestId) {
                            setStatus(t("saveFailed"), "error");
                        }
                    });
            }

            matchSelect.onchange = function () {
                activeMatch = findMatch(selectedMatchNr());
                renderGameOptions(0);
                fetchPoints();
            };

            gameSelect.onchange = function () {
                activeGame = findGame(activeMatch, selectedMatchIndex());
                fetchPoints();
            };

            refreshButton.onclick = fetchMatches;

            for (var i = 0; i < languageButtons.length; i += 1) {
                languageButtons[i].onclick = function () {
                    lang = this.getAttribute("data-lang") || "en";
                    localStorage.setItem("scoresheet-edit-lang", lang);
                    renderStaticText();
                    renderMatchOptions(selectedMatchNr());
                    renderGameOptions(selectedMatchIndex());
                    renderSetInputs(collectPoints());
                    setStatus(t("ready"));
                };
            }

            renderStaticText();
            fetchMatches();
        }());
    </script>
</body>
</html>
